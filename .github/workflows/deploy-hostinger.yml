name: Deploy to Hostinger

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      run_migrations:
        description: 'Run database migrations'
        required: false
        default: 'false'
        type: boolean
      run_seeders:
        description: 'Run database seeders (WARNING: May reset data)'
        required: false
        default: 'false'
        type: boolean

env:
  PHP_VERSION: '8.2'
  NODE_VERSION: '20'

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, ctype, json, curl, openssl, pdo, pdo_mysql
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Install NPM dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Copy Vite manifest
        run: |
          if [ -f "public/build/.vite/manifest.json" ]; then
            cp public/build/.vite/manifest.json public/build/manifest.json
          fi

      - name: Create deployment package
        run: |
          # Create deployment archive excluding dev files
          tar -czf deploy.tar.gz \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='.env' \
            --exclude='.env.local' \
            --exclude='storage/logs/*' \
            --exclude='storage/framework/cache/*' \
            --exclude='storage/framework/sessions/*' \
            --exclude='storage/framework/views/*' \
            --exclude='*.md' \
            --exclude='phpunit.xml' \
            --exclude='deploy.tar.gz' \
            . || true
          # Verify archive was created
          ls -la deploy.tar.gz

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-package
          path: deploy.tar.gz
          retention-days: 1

  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: deployment-package

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HOSTINGER_SSH_KEY }}

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.HOSTINGER_SSH_PORT }} ${{ secrets.HOSTINGER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload to server
        run: |
          scp -P ${{ secrets.HOSTINGER_SSH_PORT }} \
            deploy.tar.gz \
            ${{ secrets.HOSTINGER_SSH_USER }}@${{ secrets.HOSTINGER_HOST }}:${{ secrets.HOSTINGER_REMOTE_PATH }}/

      - name: Deploy on server
        run: |
          ssh -p ${{ secrets.HOSTINGER_SSH_PORT }} \
            ${{ secrets.HOSTINGER_SSH_USER }}@${{ secrets.HOSTINGER_HOST }} << 'DEPLOY_SCRIPT'

          cd ${{ secrets.HOSTINGER_REMOTE_PATH }}

          echo "=== Extracting deployment package ==="
          tar -xzf deploy.tar.gz
          rm deploy.tar.gz

          echo "=== Setting ownership and permissions ==="
          # Get current user
          CURRENT_USER=$(whoami)
          echo "Setting ownership to: $CURRENT_USER"

          # Set ownership for all files
          chown -R $CURRENT_USER:$CURRENT_USER . 2>/dev/null || true

          # Root .htaccess for asset redirects (critical for Hostinger)
          chmod 644 .htaccess 2>/dev/null || true

          # Storage and cache directories
          chmod -R 755 storage bootstrap/cache

          # Public directory - set directories and files separately for proper permissions
          chmod 755 public 2>/dev/null || true
          find public -type d -exec chmod 755 {} \; 2>/dev/null || true
          find public -type f -exec chmod 644 {} \; 2>/dev/null || true

          # Ensure critical files are readable
          chmod 644 public/index.php 2>/dev/null || true
          chmod 644 public/.htaccess 2>/dev/null || true

          # Build directory - ensure accessible
          chmod 755 public/build 2>/dev/null || true
          chmod 755 public/build/assets 2>/dev/null || true
          find public/build -type d -exec chmod 755 {} \; 2>/dev/null || true
          find public/build -type f -exec chmod 644 {} \; 2>/dev/null || true

          # Images directory
          mkdir -p public/images 2>/dev/null || true
          chmod 755 public/images 2>/dev/null || true
          find public/images -type f -exec chmod 644 {} \; 2>/dev/null || true

          # Debug: List permissions
          echo "=== Verifying permissions ==="
          ls -la .htaccess 2>/dev/null || echo "No root .htaccess"
          ls -la public/ | head -10
          ls -la public/build/ 2>/dev/null | head -5 || echo "No build dir yet"

          echo "=== Finding PHP path ==="
          PHP_BIN=$(which php8.2 2>/dev/null || which php 2>/dev/null || echo "php")
          echo "Using PHP: $PHP_BIN"
          $PHP_BIN -v

          echo "=== Clearing caches ==="
          $PHP_BIN artisan cache:clear
          $PHP_BIN artisan config:clear
          $PHP_BIN artisan view:clear
          $PHP_BIN artisan route:clear

          echo "=== Running migrations ==="
          $PHP_BIN artisan migrate --force

          echo "=== Running seeders ==="
          $PHP_BIN artisan db:seed --force

          echo "=== Deployment complete! ==="
          DEPLOY_SCRIPT

      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** Success" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** https://jikra.dcrayons.app" >> $GITHUB_STEP_SUMMARY
